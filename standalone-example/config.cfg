# GPUZIP Standalone Example - Configuration
# Lines starting with # are comments.

# ---- Grid & simulation ----
# a good size for my desktop GPU with 6GB...
n1    = 640
n2    = 640
n3    = 200
steps = 6751

# ---- Checkpointing ----
# Algorithm: 0=Trace (needs trace_file_path), 1=Revolve
checkpointing_algorithm = 1
revolve_log_level       = 0

# ---- Prefetch cache ----
# 0 = no prefetch (CheckpointOnly)
# 1 = CheckpointOnly with compression buffer
# >= 2 = Prefetch with LRU GPU cache (recommended >= 2)
cache_capacity = 2

# ---- Compressor ----
# 0=None, 1=cuZFP, 2=Bitcomp, 3=cuSZp
compressor = 2

# Bitcomp settings  (used when compressor=2)
#   bitcomp_delta_config: 0=MaxFraction, 1=Statistical, 2=StaticDelta
bitcomp_delta_config   = 2
bitcomp_delta          = 1e-8
bitcomp_range_fraction = 0.0
bitcomp_num_sigma      = 0.0
#   bitcomp_algorithm: 0=default, 1=sparse
bitcomp_algorithm = 0

# cuZFP settings  (used when compressor=1)
#   maxBits per value; 8 = ~4x compression on FP32
zfp_bit_rate = 8

# cuSZp settings  (used when compressor=3)
cuszp_err_bound = 1e-4

# Pre-specified worst-case compression ratio (0 = auto-detect via warm-up)
# Set to a known value (e.g. 2.6 for Bitcomp on dense RTM data) to skip warm-up.
compression_factor = 0

# ---- Logging ----
# 0=DEBUG, 1=INFO, 2=WARN, 3=ERROR
log_level = 0
